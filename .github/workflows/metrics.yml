name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  # run on every push on the master branch
  push:
    branches:
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: fengbanjiazhu
          template: classic
          base: ""

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot, yaml, json, xml, shaderlab, hlsl, glsl, c, c++, markdown
          plugin_languages_details: percentage
          plugin_languages_colors: github
          plugin_languages_indepth: yes
